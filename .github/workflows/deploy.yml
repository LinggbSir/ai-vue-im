name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          BASE_URL=${{ secrets.BASE_URL }}
          EOF

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          # 上传 .env 到服务器后端目录（添加 -o 选项）
          scp -o StrictHostKeyChecking=no .env root@${{ secrets.SERVER_IP }}:/var/www/ai-vue-im/server/.env

          # 远程执行命令（添加 -o 选项）
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} "
            cd /var/www/ai-vue-im &&
            git pull origin main &&
            cd server &&
            npm install --production &&
            pm2 restart echo-backend &&
            cd .. &&
            npm install &&
            npm run build &&
            echo 'Deployment finished'
          "